<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot-html</title>
    <style>
      body {
        font-family: Arial;
        /* body element has default margin - 8px around */
        margin: 0px; 
      }
      .send-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }
      .chat-input {
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        /*  */
        flex-grow: 1; 
      }
      .chat-input-container {
        display: flex;
        margin-bottom: 60px;
      }

      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;

        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-message-user {
        display: flex; /* When a block element is inside a flexbox, it no longer takes up the entire line*/
        justify-content: end;
        align-items: start; /* By default, elements inside a flexbox will stretch vertically*/
      }
      .chat-message-robot {
        display: flex;
        align-items: start;
      }
      .chat-message-text {
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 10px;
        max-width: 300px;
      }

      .chat-message-profile {
        width: 45px;
      }

      .chat-messages-container {
        flex-grow: 1;
        margin-top: 30px;
        overflow: scroll;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>
    
    <!--Download react for websites-->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <!-- Download javascript compiler to translate other languages into javascript -->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">


     function ChatInput({chatMessages, setChatMessages}) {
      const [inputText, setInputText] = React.useState('');
      const [isLoading, setIsLoading] = React.useState(false);

      function saveInputText(event) {
        setInputText(event.target.value);
      }

      async function sendMessage() {
        setIsLoading(true);
        if (isLoading || inputText === " ") {
          return;
        }
        
        setInputText('');
        
        const newChatMessages = [
          ...chatMessages, 
          {
            id: crypto.randomUUID(),
            message: inputText,
            sender: 'user'
          }, 
        ];
        setChatMessages(newChatMessages); // State is updated

        setChatMessages([ 
          ...newChatMessages,
          {
            id: crypto.randomUUID(),
            message: 'Loading...',
            sender: 'robot'
          }
        ]);

        const response = await Chatbot.getResponseAsync(inputText);
          
        setChatMessages([ 
          ...newChatMessages,
          { 
            id: crypto.randomUUID(),
            message: response,
            sender: 'robot'
          }
        ]);

        setIsLoading(false);
      }

      function resetInput(event) {
        if (event.key === 'Enter') {
          sendMessage();
        } else if (event.key === 'Escape') {
          setInputText('');
        }
      }

      return (
        <div className="chat-input-container">
          <input 
            placeholder="Send a message to Chatbot" 
            size="30"
            onChange={saveInputText}
            value={inputText} // change the text inside this <input>
            className="chat-input"
            onKeyDown={resetInput}
          />
          <button
            onClick={sendMessage}
            className="send-button" // class is reserved
          >Send</button>
        </div>
      );
     }

     function ChatMessage({message, sender}) {

      return (
        <div className={
          sender === 'user' 
            ? 'chat-message-user' 
            : 'chat-message-robot'
        }>
          {sender === 'robot' && (
            <img src="practice/images/robot.png" className="chat-message-profile"/>
          )}
          <div className="chat-message-text">
            {message}
          </div>
          
          {sender === 'user' && (
            <img src="practice/images/user.png" className="chat-message-profile"/>
          )}
        </div>
      );
     }
     
     
     function ChatMessages({chatMessages}) {
      return (
        <div className="chat-messages-container">
          {chatMessages.map((message) => { // 2. Generate HTML
            return (
              <ChatMessage 
                message={message.message}
                sender={message.sender}
                key={message.id}
              />
            );
          })}
        </div>
      );
     }

     function App() {
      const [chatMessages, setChatMessages] = React.useState([
        {
          id: 'id1',
          message: 'hello chatbot',
          sender: 'user'
        }, 
        {
          id: 'id2',
          message: 'Hello! How can I help you?', 
          sender: 'robot'
        }, 
        {
          id: 'id3', 
          message: 'can you get me todays date?', 
          sender: 'user'
        }, 
        {
          id: 'id4', 
          message: 'Today is September 27',
          sender: 'robot'
        }
      ]);
      return (
        <div className="app-container">
          
          <ChatMessages 
            chatMessages={chatMessages}
          />
          <ChatInput 
            chatMessages={chatMessages}
            setChatMessages={setChatMessages}
          />
        </div>
      );
     }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
