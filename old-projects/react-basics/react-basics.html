<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>
    
    <!--Download react for websites-->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <!-- Download javascript compiler to translate other languages into javascript -->
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      const button = <button>Hello</button>;
      const paragraph = <p>paragraph of text</p>;

      /*
      Benefits using React
        1. Insert javascript code into jsx elements
        2. Good for errors
        3. Straight forward, natural
      */

      const div = (
        <div>
          <button>Hello</button>
          <p>paragraph of text {2 + 2}</p>
        </div>
      );

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(div);
    </script>
  </body>
</html>
