<!DOCTYPE html>
<html>
<head>
  <title>SStS — Small Steps to Success</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 0 auto; padding: 20px; }
    #progress-bar { height: 20px; background: #e0e0e0; border-radius: 10px; margin: 20px 0; }
    #progress { height: 100%; width: 0%; background: #4CAF50; border-radius: 10px; transition: width 0.3s; }
    .task { margin: 10px 0; padding: 10px; background: #f9f9f9; border-radius: 5px; }
    button { background: #4CAF50; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Small Steps to Success</h1>
  
  <input type="text" id="main-task" placeholder="Введите задачу (например, 'Написать курсовую')">
  <button onclick="addMainTask()">Добавить</button>
  
  <div id="task-container" style="display: none;">
    <h2 id="current-task"></h2>
    <div id="progress-bar"><div id="progress"></div></div>
    
    <input type="text" id="subtask" placeholder="Добавить шаг">
    <button onclick="addSubTask()">+</button>
    
    <div id="subtasks"></div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('ssts_tasks')) || {};

    function addMainTask() {
      const mainTask = document.getElementById('main-task').value;
      if (!mainTask) return;
      
      tasks = { mainTask, subtasks: [], completed: 0 };
      localStorage.setItem('ssts_tasks', JSON.stringify(tasks));
      
      document.getElementById('current-task').textContent = mainTask;
      document.getElementById('task-container').style.display = 'block';
      updateProgress();
    }

    function addSubTask() {
      const subtask = document.getElementById('subtask').value;
      if (!subtask) return;
      
      tasks.subtasks.push({ text: subtask, done: false });
      localStorage.setItem('ssts_tasks', JSON.stringify(tasks));
      
      renderSubtasks();
      document.getElementById('subtask').value = '';
    }

    function toggleSubTask(index) {
      tasks.subtasks[index].done = !tasks.subtasks[index].done;
      tasks.completed = tasks.subtasks.filter(t => t.done).length;
      localStorage.setItem('ssts_tasks', JSON.stringify(tasks));
      
      renderSubtasks();
      updateProgress();
    }

    function renderSubtasks() {
      const container = document.getElementById('subtasks');
      container.innerHTML = '';
      
      tasks.subtasks.forEach((task, index) => {
        const div = document.createElement('div');
        div.className = 'task';
        div.innerHTML = `
          <input type="checkbox" ${task.done ? 'checked' : ''} 
                 onclick="toggleSubTask(${index})">
          ${task.text}
        `;
        container.appendChild(div);
      });
    }

    function updateProgress() {
      const total = tasks.subtasks.length;
      const percent = total > 0 ? (tasks.completed / total) * 100 : 0;
      
      document.getElementById('progress').style.width = `${percent}%`;
    }

    // Загрузка при старте
    if (tasks.mainTask) {
      document.getElementById('current-task').textContent = tasks.mainTask;
      document.getElementById('task-container').style.display = 'block';
      renderSubtasks();
      updateProgress();
    }
  </script>
</body>
</html>
